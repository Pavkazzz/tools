<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кредитный калькулятор</title>
    <meta name="description" content="Расчёт займа между друзьями: аннуитетные платежи, график, расписка">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --border: #475569;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --orange: #f59e0b;
            --radius: 12px;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            padding: 3rem 1rem 2rem;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1a1e3a 100%);
            border-bottom: 1px solid var(--surface2);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(139,92,246,0.06) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite alternate;
        }
        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, 3%); }
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent2), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            margin-bottom: 0.3rem;
        }
        .hero p {
            color: var(--text2);
            font-size: 1rem;
            position: relative;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--surface2);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border); }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-title .icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }
        .field label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.35rem;
        }
        .field input, .field textarea {
            width: 100%;
            padding: 0.6rem 0.85rem;
            background: var(--bg);
            border: 1.5px solid var(--surface2);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field input:focus, .field textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .field textarea { resize: vertical; min-height: 80px; font-size: 0.92rem; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.7rem 2rem;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
        .btn:active { transform: translateY(0); }
        .btn-row { text-align: center; margin: 1.5rem 0; }

        /* Stats row */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat {
            background: var(--surface);
            border: 1px solid var(--surface2);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            text-align: center;
        }
        .stat .label { font-size: 0.78rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.25rem; }
        .stat .value { font-size: 1.55rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        .stat .value.accent { color: var(--accent2); }
        .stat .value.green { color: var(--green); }
        .stat .value.orange { color: var(--orange); }

        /* Tables */
        .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--surface2); }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
            font-variant-numeric: tabular-nums;
        }
        th {
            background: var(--surface2);
            color: var(--text);
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.65rem 0.85rem;
            text-align: right;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
        }
        td {
            padding: 0.55rem 0.85rem;
            text-align: right;
            border-bottom: 1px solid var(--surface2);
            color: var(--text);
        }
        th:first-child, td:first-child { text-align: center; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(59, 130, 246, 0.06); }
        td.principal { color: var(--accent2); }
        td.interest { color: var(--orange); }
        td.balance { color: var(--text2); }

        /* Comparison table */
        .cmp-table tr.active td { background: var(--green-dim); }
        .cmp-table td:first-child { text-align: left; font-weight: 600; }


        /* Section titles */
        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--surface2);
        }

        /* Tabs */
        .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; }
        .tab {
            padding: 0.45rem 1rem;
            background: transparent;
            border: 1px solid var(--surface2);
            border-radius: 8px;
            color: var(--text2);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tab:hover { border-color: var(--border); color: var(--text); }
        .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }


        @media (max-width: 600px) {
            .hero h1 { font-size: 1.6rem; }
            .container { padding: 1rem 0.75rem 3rem; }
            .card { padding: 1rem; }
            .stats { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
            .stat .value { font-size: 1.2rem; }
            th, td { padding: 0.4rem 0.55rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>Кредитный калькулятор</h1>
    <p class="subtitle">Сравнение ставок: аннуитет и возврат в конце срока</p>
    <p style="text-align:center;margin-bottom:1.5rem"><a href="loan-agreement" style="color:#2563eb;font-size:0.95rem">📝 Создать долговую расписку</a></p>
</div>

<div class="container">

    <!-- Input form -->
    <div class="card">
        <div class="card-title"><span class="icon" style="background:var(--accent-glow);color:var(--accent2)">$</span> Параметры займа</div>
        <div class="form-grid">
            <div class="field">
                <label for="amount">Сумма займа, ₽</label>
                <input type="number" id="amount" value="700000" min="1000" step="1000">
            </div>
            <div class="field">
                <label for="months">Срок, месяцев</label>
                <input type="number" id="months" value="12" min="1" max="360">
            </div>
            <div class="field">
                <label for="rateFrom">Ставка, %</label>
                <input type="number" id="rateFrom" value="15.5" min="0" step="0.1">
            </div>
            <div class="field">
                <label for="rateTo">Сравнить до, %</label>
                <input type="number" id="rateTo" value="1.5" min="0" step="0.1">
            </div>
            <div class="field">
                <label for="rateStep">Шаг сравнения, %</label>
                <input type="number" id="rateStep" value="2" min="0.1" step="0.1">
            </div>
        </div>
    </div>

    <div class="btn-row"><button class="btn" onclick="calculate()">Рассчитать</button></div>

    <!-- Main results -->
    <div id="mainStats"></div>

    <!-- Payment schedule -->
    <div id="schedule"></div>

    <!-- Rate comparison -->
    <div id="comparison"></div>


</div>

<script>
function fmt(n) {
    return Math.round(n).toLocaleString('ru-RU');
}

function fmtDec(n, d) {
    return n.toLocaleString('ru-RU', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function calcAnnuity(S, annualRate, n) {
    const r = annualRate / 100 / 12;
    if (r === 0) {
        const payment = S / n;
        return { payment, total: S, overpay: 0, r: 0 };
    }
    const pow = Math.pow(1 + r, n);
    const payment = S * (r * pow) / (pow - 1);
    const total = payment * n;
    return { payment, total, overpay: total - S, r };
}

function buildSchedule(S, annualRate, n) {
    const r = annualRate / 100 / 12;
    const info = calcAnnuity(S, annualRate, n);
    const payment = info.payment;
    const rows = [];
    let balance = S;
    let totalInterest = 0;
    let totalPrincipal = 0;

    for (let i = 1; i <= n; i++) {
        const interestPart = balance * r;
        const principalPart = payment - interestPart;
        balance -= principalPart;
        if (balance < 0) balance = 0;
        totalInterest += interestPart;
        totalPrincipal += principalPart;
        rows.push({
            month: i,
            payment: Math.round(payment),
            principal: Math.round(principalPart),
            interest: Math.round(interestPart),
            totalInterest: Math.round(totalInterest),
            balance: Math.round(balance)
        });
    }
    return rows;
}

function padDate(d) { return String(d).padStart(2, '0'); }

function dateAfterMonths(start, months) {
    const d = new Date(start);
    d.setMonth(d.getMonth() + months);
    return d;
}

function formatDate(d) {
    return `${padDate(d.getDate())}.${padDate(d.getMonth() + 1)}.${d.getFullYear()}`;
}

function numWord(n, one, two, five) {
    n = Math.abs(n) % 100;
    const n1 = n % 10;
    if (n > 10 && n < 20) return five;
    if (n1 > 1 && n1 < 5) return two;
    if (n1 === 1) return one;
    return five;
}

function calculate() {
    const S = parseFloat(document.getElementById('amount').value);
    const months = parseInt(document.getElementById('months').value);
    const mainRate = parseFloat(document.getElementById('rateFrom').value);
    const to = parseFloat(document.getElementById('rateTo').value);
    const step = parseFloat(document.getElementById('rateStep').value);

    if (!S || !months || isNaN(mainRate) || isNaN(to) || !step) return;

    const main = calcAnnuity(S, mainRate, months);
    const schedule = buildSchedule(S, mainRate, months);
    const today = new Date();
    const endDate = dateAfterMonths(today, months);

    // === Main stats ===
    let html = `
    <div class="stats">
        <div class="stat">
            <div class="label">Ежемесячный платёж</div>
            <div class="value accent">${fmt(main.payment)} ₽</div>
        </div>
        <div class="stat">
            <div class="label">Всего выплат</div>
            <div class="value">${fmt(main.total)} ₽</div>
        </div>
        <div class="stat">
            <div class="label">Переплата</div>
            <div class="value orange">${fmt(main.overpay)} ₽</div>
        </div>
        <div class="stat">
            <div class="label">Эффективная ставка</div>
            <div class="value green">${fmtDec(mainRate, 1)}%</div>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="label">Сумма займа</div>
            <div class="value">${fmt(S)} ₽</div>
        </div>
        <div class="stat">
            <div class="label">Срок</div>
            <div class="value">${months} ${numWord(months, 'месяц', 'месяца', 'месяцев')}</div>
        </div>
        <div class="stat">
            <div class="label">Дата окончания</div>
            <div class="value" style="font-size:1.1rem">${formatDate(endDate)}</div>
        </div>
        <div class="stat">
            <div class="label">Переплата, %</div>
            <div class="value orange">${fmtDec(main.overpay / S * 100, 1)}%</div>
        </div>
    </div>`;
    document.getElementById('mainStats').innerHTML = html;

    // === Schedule ===
    let schedHtml = `<div class="section-title">График аннуитетных платежей</div>`;
    schedHtml += `<div class="card"><div class="table-wrap"><table>
        <thead><tr>
            <th>№</th><th>Дата</th><th>Платёж</th><th>Основной долг</th><th>Проценты</th><th>Остаток</th>
        </tr></thead><tbody>`;
    schedule.forEach(row => {
        const payDate = dateAfterMonths(today, row.month);
        schedHtml += `<tr>
            <td>${row.month}</td>
            <td>${formatDate(payDate)}</td>
            <td>${fmt(row.payment)} ₽</td>
            <td class="principal">${fmt(row.principal)} ₽</td>
            <td class="interest">${fmt(row.interest)} ₽</td>
            <td class="balance">${fmt(row.balance)} ₽</td>
        </tr>`;
    });
    const totalPrincipal = schedule.reduce((s, r) => s + r.principal, 0);
    const totalInterest = schedule.reduce((s, r) => s + r.interest, 0);
    schedHtml += `<tr style="font-weight:700;border-top:2px solid var(--border)">
        <td></td><td>Итого</td>
        <td>${fmt(totalPrincipal + totalInterest)} ₽</td>
        <td class="principal">${fmt(totalPrincipal)} ₽</td>
        <td class="interest">${fmt(totalInterest)} ₽</td>
        <td></td>
    </tr>`;
    schedHtml += `</tbody></table></div></div>`;
    document.getElementById('schedule').innerHTML = schedHtml;

    // === Comparison table ===
    const rates = [];
    if (mainRate >= to) {
        for (let r = mainRate; r >= to - 0.001; r -= step) rates.push(Math.round(r * 10) / 10);
    } else {
        for (let r = mainRate; r <= to + 0.001; r += step) rates.push(Math.round(r * 10) / 10);
    }

    let cmpHtml = `<div class="section-title">Сравнение ставок</div>`;
    cmpHtml += `<div class="card"><div class="table-wrap"><table class="cmp-table">
        <thead><tr><th>Ставка</th><th>Платёж/мес.</th><th>Всего выплат</th><th>Переплата</th><th>Переплата, %</th></tr></thead><tbody>`;
    rates.forEach(rate => {
        const a = calcAnnuity(S, rate, months);
        const isActive = Math.abs(rate - mainRate) < 0.01;
        cmpHtml += `<tr class="${isActive ? 'active' : ''}">
            <td>${fmtDec(rate, 1)}%${isActive ? ' ◀' : ''}</td>
            <td>${fmt(a.payment)} ₽</td>
            <td>${fmt(a.total)} ₽</td>
            <td>${fmt(a.overpay)} ₽</td>
            <td>${fmtDec(a.overpay / S * 100, 1)}%</td>
        </tr>`;
    });
    cmpHtml += `</tbody></table></div></div>`;
    document.getElementById('comparison').innerHTML = cmpHtml;

}



calculate();
</script>
</body>
</html>
