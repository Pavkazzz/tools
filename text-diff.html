<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Compare two blocks of text side-by-side with highlighted differences.">
    <title>Text Diff</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #1a1a1a;
        }
        h1 { margin-bottom: 1rem; }
        .inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 600px) {
            .inputs { grid-template-columns: 1fr; }
        }
        label {
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: block;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 0.75rem;
            font-size: 0.9rem;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        button {
            margin-top: 1rem;
            padding: 0.6rem 1.5rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        .diff-output {
            margin-top: 1.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .diff-line {
            padding: 2px 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .diff-add {
            background: #d4edda;
            color: #155724;
        }
        .diff-add::before { content: "+ "; font-weight: bold; }
        .diff-del {
            background: #f8d7da;
            color: #721c24;
        }
        .diff-del::before { content: "- "; font-weight: bold; }
        .diff-eq {
            background: #fff;
            color: #444;
        }
        .diff-eq::before { content: "  "; }
        .diff-separator {
            background: #e9ecef;
            color: #888;
            padding: 4px 12px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Text Diff</h1>
    <div class="inputs">
        <div>
            <label for="textA">Original</label>
            <textarea id="textA" placeholder="Paste original text..."></textarea>
        </div>
        <div>
            <label for="textB">Modified</label>
            <textarea id="textB" placeholder="Paste modified text..."></textarea>
        </div>
    </div>
    <button onclick="computeDiff()">Compare</button>
    <div class="diff-output" id="output"></div>

    <script>
        function computeDiff() {
            const a = document.getElementById('textA').value.split('\n');
            const b = document.getElementById('textB').value.split('\n');
            const result = lcs(a, b);
            const output = document.getElementById('output');
            output.innerHTML = '';

            if (result.length === 0 && a.join('') === '' && b.join('') === '') return;

            for (const item of result) {
                const div = document.createElement('div');
                div.className = 'diff-line ' + (
                    item.type === 'add' ? 'diff-add' :
                    item.type === 'del' ? 'diff-del' : 'diff-eq'
                );
                div.textContent = item.line;
                output.appendChild(div);
            }
        }

        function lcs(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({length: m + 1}, () => Array(n + 1).fill(0));

            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (a[i-1] === b[j-1]) {
                        dp[i][j] = dp[i-1][j-1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
                    }
                }
            }

            const result = [];
            let i = m, j = n;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
                    result.unshift({type: 'eq', line: a[i-1]});
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
                    result.unshift({type: 'add', line: b[j-1]});
                    j--;
                } else {
                    result.unshift({type: 'del', line: a[i-1]});
                    i--;
                }
            }
            return result;
        }
    </script>
</body>
</html>
